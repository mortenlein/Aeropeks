name: "Release Aeropeks"

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "windows-latest"
            args: "--bundles nsis,msi"
          - platform: "ubuntu-latest"
            args: "--bundles deb,appimage"

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: install Linux system dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev libdbus-1-dev \
            libssl-dev pkg-config libgtk-layer-shell-dev patchelf

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'windows-latest' && 'x86_64-pc-windows-msvc' || '' }}

      - name: install frontend dependencies
        run: npm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__ # the action will replace 'v__VERSION__' with the app version from tauri.conf.json
          releaseName: "Aeropeks v__VERSION__"
          releaseBody: "Automated release for Aeropeks. See attached assets for the latest version."
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
